<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  
  <!-- Viewport - 关键的响应式配置 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#7C5CFC" />
  <meta name="background-color" content="#F0EDFA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="幼儿阅读" />
  <meta name="mobile-web-app-capable" content="yes" />
  
  <!-- iOS 启动画面和图标 -->
  <link rel="apple-touch-icon" href="/assets/images/icon.png" />
  
  <!-- 应用描述 -->
  <meta name="description" content="专为幼儿设计的阅读学习应用，支持PDF绘本、音频、视频，闯关游戏" />
  
  <!-- 禁止电话号码自动识别 -->
  <meta name="format-detection" content="telephone=no" />
  
  <title>幼儿阅读学习</title>
  
  <style>
    /* iOS Safari 安全区域适配 */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #F0EDFA;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }
    
    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    /* 禁止iOS橡皮筋效果 */
    body {
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
    }
    
    /* 启动画面样式 */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F0EDFA;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }
    
    .splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      background: linear-gradient(135deg, #7C5CFC 0%, #FF8FAB 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(124, 92, 252, 0.3);
    }
    
    .splash-text {
      margin-top: 24px;
      font-size: 20px;
      font-weight: 700;
      color: #2D2B3D;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* 桌面端最大宽度限制 */
    @media (min-width: 768px) {
      #root {
        max-width: 480px;
        margin: 0 auto;
        box-shadow: 0 0 60px rgba(124, 92, 252, 0.1);
      }
      
      body {
        background-color: #E5E0F5;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
    
    /* iPad 适配 */
    @media (min-width: 768px) and (max-width: 1024px) {
      #root {
        max-width: 100%;
        box-shadow: none;
      }
      
      body {
        background-color: #F0EDFA;
        display: block;
      }
    }
  </style>
</head>
<body>
  <!-- 启动画面 -->
  <div class="splash-screen" id="splash">
    <div class="splash-icon">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 19.5C4 18.837 4.26339 18.2011 4.73223 17.7322C5.20107 17.2634 5.83696 17 6.5 17H20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 2H20V22H6.5C5.83696 22 5.20107 21.7366 4.73223 21.2678C4.26339 20.7989 4 20.163 4 19.5V4.5C4 3.83696 4.26339 3.20107 4.73223 2.73223C5.20107 2.26339 5.83696 2 6.5 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="splash-text">幼儿阅读学习</div>
  </div>
  
  <div id="root"></div>
  
  <script>
    // 隐藏启动画面
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() {
            splash.remove();
          }, 300);
        }
      }, 500);
    });
    
    // 禁止双击缩放
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      var now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
    
    // 禁止双指缩放
    document.addEventListener('gesturestart', function(event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
